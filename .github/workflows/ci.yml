name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # =========================================================================
  # Lint & Type Check
  # =========================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Lint with Ruff
        run: |
          ruff check --select=E,F,W --ignore=E501 \
            config.py rag_engine.py api.py eval.py rag.py pdfclawer.py

      - name: Format check
        run: |
          ruff format --check \
            config.py rag_engine.py api.py eval.py rag.py pdfclawer.py

  # =========================================================================
  # Syntax & Import Check
  # =========================================================================
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax
        run: |
          for f in config.py rag_engine.py api.py eval.py rag.py pdfclawer.py; do
            python -c "import ast; ast.parse(open('$f').read()); print(f'  ✅ $f')"
          done

  # =========================================================================
  # Smoke Test (no GPU/Ollama required)
  # =========================================================================
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core deps
        run: |
          pip install pydantic langchain-core

      - name: Test config module
        run: |
          python -c "
          from config import Config
          assert Config.CHUNK_SIZE == 500
          assert Config.LLM_MODEL == 'qwen:7b'
          assert Config.VECTOR_STORE_DIR.endswith('chroma_db')
          print('Config: OK')
          "

      - name: Test eval module (no RAG init)
        run: |
          # Verify eval module parses and has test questions
          python -c "
          import ast
          tree = ast.parse(open('eval.py').read())
          funcs = [n.name for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)]
          assert 'generate_report' in funcs
          print('Eval module: OK')
          "

  # =========================================================================
  # Docker Build Check
  # =========================================================================
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
